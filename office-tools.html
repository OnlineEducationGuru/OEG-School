<!DOCTYPE html>
<html lang="gu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Office Tools - ઓફિસ ઉપયોગી ટૂલ્સ | Online Education Guru">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#6c63ff">
    <title>Office Tools - Online Education Guru</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="css/common.css">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1217460377621795"
        crossorigin="anonymous"></script>
</head>

<body>

    <!-- Header -->
    <header class="site-header" id="site-header"></header>

    <!-- Breaking News -->
    <div class="news-ticker" id="news-ticker"></div>

    <!-- Loader -->
    <div class="loader-overlay" id="app-loader">
        <div class="spinner"></div>
        <div class="loader-text">લોડ થઈ રહ્યું છે...</div>
    </div>

    <!-- Main Content -->
    <main class="page-wrapper">
        <div class="container">

            <!-- Page Header -->
            <div class="page-header">
                <button class="back-btn" onclick="history.back()">←</button>
                <h1 class="page-title">🏢 Office Tools</h1>
            </div>

            <!-- Ad Banner -->
            <div class="ad-container" data-ad-slot="2222222201" data-ad-format="auto"></div>

            <!-- Tools Strip List -->
            <section class="section">
                <div class="strip-list" id="officeToolsList">
                    <!-- Loaded dynamically -->
                </div>
            </section>

            <!-- Ad Banner -->
            <div class="ad-container ad-container-rect" data-ad-slot="2222222202" data-ad-format="auto"></div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer" id="site-footer"></footer>

    <!-- Scripts -->
    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            showLoader();
            renderSkeletonStrips('officeToolsList', 6);

            try {
                const res = await apiCached('getOfficeTools');
                if (res.success && res.data.length > 0) {
                    renderStripList(res.data.map(item => ({
                        id: item.id,
                        name: item.name,
                        icon: item.icon || '🏢',
                        link: item.fileUrl || '#',
                        subtitle: item.fileName || ''
                    })), 'officeToolsList', { target: '_blank' });
                } else {
                    renderDefaultOfficeTools();
                }
            } catch (err) {
                console.error('Error loading office tools:', err);
                renderDefaultOfficeTools();
            }

            hideLoader();
        });

        function renderDefaultOfficeTools() {
            const defaults = [
                { name: 'પગાર બિલ જનરેટર', icon: '💰', subtitle: 'Salary Bill Generator' },
                { name: 'GPF સ્ટેટમેન્ટ', icon: '📊', subtitle: 'GPF Statement' },
                { name: 'લીવ એપ્લિકેશન', icon: '📝', subtitle: 'Leave Application' },
                { name: 'સર્વિસ બુક', icon: '📗', subtitle: 'Service Book Entry' },
                { name: 'આવક-જાવક નોંધણી', icon: '📋', subtitle: 'Income-Expense Register' },
                { name: 'ઑફિસ ફોર્મ્સ', icon: '📄', subtitle: 'Various Office Forms' },
                { name: 'રજા હિસાબ', icon: '📅', subtitle: 'Leave Calculator' },
                { name: 'પેન્શન ગણતરી', icon: '🧮', subtitle: 'Pension Calculator' }
            ];
            const container = document.getElementById('officeToolsList');
            container.innerHTML = defaults.map((item, i) => `
        <div class="strip-item" style="animation-delay: ${i * 0.08}s">
          <div class="strip-icon">${item.icon}</div>
          <div class="strip-content">
            <div class="strip-title">${item.name}</div>
            <div class="strip-subtitle">${item.subtitle}</div>
          </div>
          <span class="strip-arrow">›</span>
        </div>
      `).join('');
        }
    </script>
</body>

</html>

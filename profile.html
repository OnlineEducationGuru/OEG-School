<!DOCTYPE html>
<html lang="gu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="My Profile - Online Education Guru">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#6c63ff">
    <title>Profile - Online Education Guru</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="css/common.css">
    <style>
        .profile-wrapper {
            min-height: 100vh;
            padding-top: 120px;
            padding-bottom: var(--space-2xl);
        }

        .profile-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            overflow: hidden;
            animation: fadeInUp 0.4s ease;
            max-width: 600px;
            margin: 0 auto;
        }

        .profile-banner {
            height: 100px;
            background: linear-gradient(135deg, var(--primary), var(--accent-cyan), var(--accent-pink));
            position: relative;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-full);
            background: var(--bg-dark);
            border: 4px solid var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-light);
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .profile-body {
            padding: 52px var(--space-xl) var(--space-xl);
            text-align: center;
        }

        .profile-name {
            font-size: var(--font-size-xl);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-role {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 14px;
            border-radius: 100px;
            font-size: var(--font-size-xs);
            font-weight: 600;
            margin-bottom: var(--space-lg);
        }

        .profile-role.student {
            background: rgba(0, 200, 150, 0.15);
            color: var(--accent-green);
        }

        .profile-role.teacher {
            background: rgba(108, 99, 255, 0.15);
            color: var(--primary-light);
        }

        .profile-details {
            text-align: left;
        }

        .detail-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-sm) 0;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-size: var(--font-size-sm);
            color: var(--text-muted);
            font-weight: 500;
        }

        .detail-value {
            font-size: var(--font-size-sm);
            font-weight: 600;
            color: var(--text-primary);
        }

        .edit-form {
            display: none;
            text-align: left;
        }

        .edit-form.active {
            display: block;
        }

        .profile-actions {
            display: flex;
            gap: var(--space-sm);
            margin-top: var(--space-lg);
        }

        .stats-section {
            max-width: 600px;
            margin: var(--space-xl) auto 0;
        }

        .stats-title {
            font-size: var(--font-size-lg);
            font-weight: 700;
            margin-bottom: var(--space-md);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-md);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-sm);
            animation: fadeInUp 0.3s ease both;
        }

        .stat-item-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, rgba(108, 99, 255, 0.15), rgba(0, 229, 255, 0.15));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .stat-item-info {
            flex: 1;
        }

        .stat-item-name {
            font-weight: 600;
            font-size: var(--font-size-sm);
        }

        .stat-item-meta {
            font-size: var(--font-size-xs);
            color: var(--text-muted);
        }

        .stat-item-score {
            font-weight: 700;
            font-size: var(--font-size-md);
            color: var(--accent-green);
        }

        .logout-section {
            max-width: 600px;
            margin: var(--space-xl) auto 0;
        }

        .logout-btn {
            width: 100%;
            padding: var(--space-md);
            border-radius: var(--radius-md);
            background: rgba(255, 64, 129, 0.1);
            border: 1px solid rgba(255, 64, 129, 0.3);
            color: var(--accent-pink);
            font-size: var(--font-size-md);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
        }

        .logout-btn:hover {
            background: rgba(255, 64, 129, 0.2);
            border-color: var(--accent-pink);
        }
    </style>
</head>

<body>

    <header class="site-header" id="site-header"></header>
    <div class="news-ticker" id="news-ticker"></div>
    <div class="loader-overlay" id="app-loader">
        <div class="spinner"></div>
        <div class="loader-text">લોડ થઈ રહ્યું છે...</div>
    </div>

    <main class="profile-wrapper">
        <div class="container">

            <div class="page-header">
                <button class="back-btn" onclick="history.back()">←</button>
                <h1 class="page-title">👤 મારી પ્રોફાઈલ</h1>
            </div>

            <!-- Profile Card -->
            <div class="profile-card" id="profileCard">
                <div class="profile-banner">
                    <div class="profile-avatar" id="profileAvatar">?</div>
                </div>
                <div class="profile-body">
                    <div class="profile-name" id="profileName">-</div>
                    <div class="profile-role" id="profileRole">-</div>

                    <!-- View Mode -->
                    <div class="profile-details" id="viewMode">
                        <div id="detailsView"></div>
                        <div class="profile-actions">
                            <button class="btn btn-primary btn-full" onclick="showEditMode()">✏️ માહિતી એડિટ
                                કરો</button>
                        </div>
                    </div>

                    <!-- Edit Mode -->
                    <div class="edit-form" id="editMode">
                        <div id="editFields"></div>
                        <div class="profile-actions">
                            <button class="btn btn-secondary btn-full" onclick="cancelEdit()">❌ રદ કરો</button>
                            <button class="btn btn-primary btn-full" onclick="saveProfile()">💾 સેવ કરો</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quiz Stats -->
            <div class="stats-section">
                <div class="stats-title">📊 મારા ક્વિઝ સ્કોર</div>
                <div id="quizStats">
                    <div class="empty-state" style="padding:var(--space-lg);">
                        <div class="empty-icon">📊</div>
                        <div class="empty-text">હજુ સુધી કોઈ ક્વિઝ રમી નથી</div>
                    </div>
                </div>
            </div>

            <!-- Logout -->
            <div class="logout-section">
                <button class="logout-btn" onclick="doLogout()">
                    🚪 લૉગઆઉટ કરો
                </button>
            </div>

        </div>
    </main>

    <footer class="site-footer" id="site-footer"></footer>

    <script src="js/common.js"></script>
    <script>
        let currentUser = null;
        let profileData = null;

        document.addEventListener('DOMContentLoaded', async function () {
            currentUser = getUser();
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }

            showLoader('પ્રોફાઈલ લોડ થઈ રહ્યું છે...');

            // Set basic info from localStorage
            document.getElementById('profileAvatar').textContent = currentUser.name ? currentUser.name.charAt(0).toUpperCase() : '?';
            document.getElementById('profileName').textContent = currentUser.name || 'Unknown';

            const roleEl = document.getElementById('profileRole');
            if (currentUser.role === 'teacher') {
                roleEl.textContent = '👨‍🏫 શિક્ષક';
                roleEl.className = 'profile-role teacher';
            } else {
                roleEl.textContent = '👨‍🎓 વિદ્યાર્થી';
                roleEl.className = 'profile-role student';
            }

            // Fetch detailed profile from server
            try {
                const action = currentUser.role === 'teacher' ? 'getTeacherByMobile' : 'getStudentByMobile';
                const res = await api(action, { mobile: currentUser.mobile });
                if (res.success) {
                    profileData = res.data;
                    renderProfileView();
                } else {
                    renderProfileView();
                }
            } catch (e) {
                console.error('Profile fetch error:', e);
                renderProfileView();
            }

            // Fetch quiz stats
            try {
                const scoresRes = await api('getMyScores', { mobile: currentUser.mobile });
                if (scoresRes.success && scoresRes.data.length > 0) {
                    renderQuizStats(scoresRes.data);
                }
            } catch (e) {
                console.error('Scores fetch error:', e);
            }

            hideLoader();
        });

        function renderProfileView() {
            const data = profileData || currentUser;
            let html = '';

            html += detailRow('📱 મોબાઈલ', data.mobile || '-');
            html += detailRow('👤 નામ', data.name || '-');

            if (currentUser.role === 'student') {
                html += detailRow('📚 ધોરણ', data.standard || '-');
                html += detailRow('🏫 શાળા', data.schoolName || '-');
            } else {
                html += detailRow('🏫 શાળા', data.schoolName || '-');
                html += detailRow('🆔 DISE કોડ', data.dise || '-');
                html += detailRow('📧 ઈમેલ', data.email || '-');
                html += detailRow('✅ વેરિફાઈડ', data.verified === 'true' ? 'હા' : 'ના');
            }

            document.getElementById('detailsView').innerHTML = html;
        }

        function detailRow(label, value) {
            return `<div class="detail-row">
                <span class="detail-label">${label}</span>
                <span class="detail-value">${value}</span>
            </div>`;
        }

        function showEditMode() {
            const data = profileData || currentUser;
            let html = '';

            html += `<div class="form-group"><label class="form-label">👤 નામ</label>
                <input type="text" class="form-input" id="editName" value="${data.name || ''}"></div>`;

            if (currentUser.role === 'student') {
                html += `<div class="form-group"><label class="form-label">📚 ધોરણ</label>
                    <input type="text" class="form-input" id="editStandard" value="${data.standard || ''}"></div>`;
                html += `<div class="form-group"><label class="form-label">🏫 શાળા</label>
                    <input type="text" class="form-input" id="editSchool" value="${data.schoolName || ''}"></div>`;
            } else {
                html += `<div class="form-group"><label class="form-label">🏫 શાળા</label>
                    <input type="text" class="form-input" id="editSchool" value="${data.schoolName || ''}"></div>`;
                html += `<div class="form-group"><label class="form-label">🆔 DISE કોડ</label>
                    <input type="text" class="form-input" id="editDise" value="${data.dise || ''}"></div>`;
            }

            document.getElementById('editFields').innerHTML = html;
            document.getElementById('viewMode').style.display = 'none';
            document.getElementById('editMode').classList.add('active');
        }

        function cancelEdit() {
            document.getElementById('editMode').classList.remove('active');
            document.getElementById('viewMode').style.display = 'block';
        }

        async function saveProfile() {
            const name = document.getElementById('editName').value.trim();
            if (!name) {
                showToast('નામ ખાલી ના રાખો', 'error');
                return;
            }

            showLoader('સેવ થઈ રહ્યું છે...');

            let params = { mobile: currentUser.mobile, name };

            if (currentUser.role === 'student') {
                params.standard = document.getElementById('editStandard').value.trim();
                params.schoolName = document.getElementById('editSchool').value.trim();
                var action = 'updateStudentProfile';
            } else {
                params.schoolName = document.getElementById('editSchool').value.trim();
                params.dise = document.getElementById('editDise').value.trim();
                if (params.dise && !/^\d{11}$/.test(params.dise)) {
                    showToast('DISE કોડ 11 અંકનો હોવો જોઈએ', 'error');
                    hideLoader();
                    return;
                }
                var action = 'updateTeacherProfile';
            }

            try {
                const res = await api(action, params);
                if (res.success) {
                    // Update local storage
                    currentUser.name = name;
                    setUser(currentUser, currentUser.role);

                    // Update profileData
                    if (profileData) {
                        profileData.name = name;
                        if (params.standard !== undefined) profileData.standard = params.standard;
                        if (params.schoolName !== undefined) profileData.schoolName = params.schoolName;
                        if (params.dise !== undefined) profileData.dise = params.dise;
                    }

                    // Refresh view
                    document.getElementById('profileAvatar').textContent = name.charAt(0).toUpperCase();
                    document.getElementById('profileName').textContent = name;
                    renderProfileView();
                    cancelEdit();
                    showToast('પ્રોફાઈલ અપડેટ થઈ! ✅', 'success');
                } else {
                    showToast(res.error || 'Error updating', 'error');
                }
            } catch (e) {
                showToast('Error saving profile', 'error');
            }

            hideLoader();
        }

        function renderQuizStats(scores) {
            // Aggregate by category
            const catMap = {};
            scores.forEach(s => {
                const catName = s.categoryName || 'Unknown';
                if (!catMap[catName]) {
                    catMap[catName] = { totalScore: 0, totalPossible: 0, attempts: 0 };
                }
                catMap[catName].totalScore += Number(s.score || 0);
                catMap[catName].totalPossible += Number(s.total || 0);
                catMap[catName].attempts += 1;
            });

            const categories = Object.entries(catMap);
            const grandTotal = categories.reduce((acc, [, v]) => ({
                score: acc.score + v.totalScore,
                total: acc.total + v.totalPossible,
                attempts: acc.attempts + v.attempts
            }), { score: 0, total: 0, attempts: 0 });

            let html = `
                <div class="stat-item" style="border-color:var(--primary);background:rgba(108,99,255,0.05);">
                    <div class="stat-item-icon" style="background:linear-gradient(135deg,rgba(108,99,255,0.3),rgba(0,229,255,0.2));">🏆</div>
                    <div class="stat-item-info">
                        <div class="stat-item-name">કુલ સ્કોર</div>
                        <div class="stat-item-meta">${grandTotal.attempts} ક્વિઝ રમ્યા · ${grandTotal.score}/${grandTotal.total}</div>
                    </div>
                    <div class="stat-item-score">${grandTotal.score}</div>
                </div>
            `;

            categories.forEach(([catName, data], i) => {
                html += `
                    <div class="stat-item" style="animation-delay:${(i + 1) * 0.05}s">
                        <div class="stat-item-icon">📝</div>
                        <div class="stat-item-info">
                            <div class="stat-item-name">${catName}</div>
                            <div class="stat-item-meta">${data.attempts} વખત · ${data.totalScore}/${data.totalPossible}</div>
                        </div>
                        <div class="stat-item-score">${data.totalScore}</div>
                    </div>
                `;
            });

            document.getElementById('quizStats').innerHTML = html;
        }

        function doLogout() {
            if (confirm('શું તમે ખરેખર લૉગઆઉટ કરવા માંગો છો?')) {
                logout();
            }
        }
    </script>
</body>

</html>

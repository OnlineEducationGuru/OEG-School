<!DOCTYPE html>
<html lang="gu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Leaderboard - Top Quiz Scorers | Online Education Guru">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#6c63ff">
    <title>Leaderboard - Online Education Guru</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="css/common.css">
    <style>
        .lb-podium {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: var(--space-md);
            margin-bottom: var(--space-xl);
            padding: var(--space-lg) 0;
        }

        .lb-podium-item {
            text-align: center;
            animation: fadeInUp 0.5s ease both;
        }

        .lb-podium-item:nth-child(1) {
            animation-delay: 0.2s;
        }

        .lb-podium-item:nth-child(2) {
            animation-delay: 0.1s;
        }

        .lb-podium-item:nth-child(3) {
            animation-delay: 0.3s;
        }

        .lb-avatar {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto var(--space-xs);
            font-weight: 700;
        }

        .lb-podium-item:nth-child(2) .lb-avatar {
            width: 72px;
            height: 72px;
            font-size: 2rem;
            background: linear-gradient(135deg, #ffd600, #ff9100);
            color: #1a1030;
        }

        .lb-podium-item:nth-child(1) .lb-avatar {
            background: linear-gradient(135deg, #b0bec5, #78909c);
            color: #1a1030;
        }

        .lb-podium-item:nth-child(3) .lb-avatar {
            background: linear-gradient(135deg, #ff8a65, #d84315);
            color: #fff;
        }

        .lb-podium-name {
            font-size: var(--font-size-sm);
            font-weight: 600;
            margin-bottom: 2px;
        }

        .lb-podium-score {
            font-size: var(--font-size-xs);
            color: var(--accent-cyan);
        }

        .lb-pillar {
            width: 80px;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            margin-top: var(--space-sm);
        }

        .lb-podium-item:nth-child(2) .lb-pillar {
            height: 80px;
            background: linear-gradient(180deg, #ffd600 0%, #ff9100 100%);
        }

        .lb-podium-item:nth-child(1) .lb-pillar {
            height: 56px;
            background: linear-gradient(180deg, #b0bec5 0%, #78909c 100%);
        }

        .lb-podium-item:nth-child(3) .lb-pillar {
            height: 40px;
            background: linear-gradient(180deg, #ff8a65 0%, #d84315 100%);
        }

        .lb-pillar-rank {
            padding-top: var(--space-sm);
            font-size: var(--font-size-xl);
            font-weight: 800;
            color: rgba(0, 0, 0, 0.5);
        }

        .lb-row {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-md);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-sm);
            animation: fadeInUp 0.3s ease both;
        }

        .lb-rank {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            background: var(--bg-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: var(--font-size-sm);
            flex-shrink: 0;
        }

        .lb-info {
            flex: 1;
        }

        .lb-row-name {
            font-weight: 600;
            font-size: var(--font-size-sm);
        }

        .lb-row-cat {
            font-size: var(--font-size-xs);
            color: var(--text-muted);
        }

        .lb-row-score {
            font-weight: 700;
            font-size: var(--font-size-md);
            color: var(--accent-cyan);
        }

        .cat-filter {
            display: flex;
            gap: var(--space-sm);
            overflow-x: auto;
            scrollbar-width: none;
            padding: var(--space-sm) 0;
            margin-bottom: var(--space-lg);
        }

        .cat-filter::-webkit-scrollbar {
            display: none;
        }

        .cat-chip {
            flex-shrink: 0;
            padding: 6px 16px;
            border-radius: 100px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            font-size: var(--font-size-sm);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            white-space: nowrap;
            color: var(--text-primary);
        }

        .cat-chip:hover,
        .cat-chip.active {
            background: var(--primary-glow);
            border-color: var(--primary);
            color: var(--primary-light);
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1217460377621795"
        crossorigin="anonymous"></script>
</head>

<body>

    <header class="site-header" id="site-header"></header>
    <div class="news-ticker" id="news-ticker"></div>
    <div class="loader-overlay" id="app-loader">
        <div class="spinner"></div>
        <div class="loader-text">લોડ થઈ રહ્યું છે...</div>
    </div>

    <main class="page-wrapper">
        <div class="container">

            <div class="page-header">
                <button class="back-btn" onclick="window.location.href='quiz.html'">←</button>
                <h1 class="page-title">🏆 લીડરબોર્ડ</h1>
            </div>

            <div class="ad-container" data-ad-slot="1212121201" data-ad-format="auto"></div>

            <!-- Category Filter -->
            <div class="cat-filter" id="catFilter">
                <button class="cat-chip active" onclick="filterLeaderboard('all', this)">🏆 બધા</button>
            </div>

            <!-- Podium (Top 3) -->
            <div class="lb-podium" id="lbPodium">
                <!-- Rendered dynamically -->
            </div>

            <!-- Full List -->
            <div id="leaderboardList">
                <!-- Loaded dynamically -->
            </div>

            <div class="ad-container ad-container-rect" data-ad-slot="1212121202" data-ad-format="auto"></div>

        </div>
    </main>

    <footer class="site-footer" id="site-footer"></footer>

    <script src="js/common.js"></script>
    <script>
        let catData = [];
        let grandData = [];

        document.addEventListener('DOMContentLoaded', async function () {
            showLoader('લીડરબોર્ડ લોડ થઈ રહ્યું છે...');

            try {
                const res = await api('getLeaderboard');
                if (res.success && res.data) {
                    catData = res.data.categoryWise || [];
                    grandData = res.data.grandTotal || [];
                    buildCategoryFilter();
                    renderLeaderboardFull(grandData); // Default: show grand total
                } else {
                    renderEmptyLeaderboard();
                }
            } catch (err) {
                console.error('Error:', err);
                renderEmptyLeaderboard();
            }

            hideLoader();
        });

        function buildCategoryFilter() {
            const categories = [...new Set(catData.map(r => r.categoryName).filter(Boolean))];
            const filter = document.getElementById('catFilter');
            filter.innerHTML = `<button class="cat-chip active" onclick="filterLeaderboard('all', this)">🏆 બધા</button>` +
                categories.map(c => `<button class="cat-chip" onclick="filterLeaderboard('${c}', this)">${c}</button>`).join('');
        }

        function filterLeaderboard(category, el) {
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
            if (el) el.classList.add('active');

            if (category === 'all') {
                renderLeaderboardFull(grandData);
            } else {
                const filtered = catData.filter(r => r.categoryName === category);
                filtered.sort((a, b) => b.totalScore - a.totalScore);
                renderLeaderboardFull(filtered);
            }
        }

        function renderLeaderboardFull(data) {
            if (!data || data.length === 0) {
                renderEmptyLeaderboard();
                return;
            }

            // Sort by totalScore descending
            const sorted = [...data].sort((a, b) => b.totalScore - a.totalScore);

            // Podium (Top 3) - reorder: 2nd, 1st, 3rd
            const podium = document.getElementById('lbPodium');
            const top3 = sorted.slice(0, 3);
            const podiumOrder = top3.length >= 3 ? [top3[1], top3[0], top3[2]] : top3;

            podium.innerHTML = podiumOrder.map((r, i) => {
                const actualRank = top3.length >= 3 ? (i === 0 ? 2 : i === 1 ? 1 : 3) : (i + 1);
                if (top3.length < 3 && i > 0) return '';
                return `
          <div class="lb-podium-item">
            <div class="lb-avatar">${r.studentName ? r.studentName.charAt(0).toUpperCase() : '?'}</div>
            <div class="lb-podium-name">${r.studentName || 'Unknown'}</div>
            <div class="lb-podium-score">${r.totalScore} માર્ક્સ</div>
            <div class="lb-pillar"><div class="lb-pillar-rank">${actualRank}</div></div>
          </div>
        `;
            }).join('');

            // Full list (4th onward)
            const listEl = document.getElementById('leaderboardList');
            if (sorted.length <= 3) {
                listEl.innerHTML = '';
                return;
            }

            listEl.innerHTML = sorted.slice(3, 50).map((r, i) => `
        <div class="lb-row" style="animation-delay:${i * 0.04}s">
          <div class="lb-rank">${i + 4}</div>
          <div class="lb-info">
            <div class="lb-row-name">${r.studentName || 'Unknown'}</div>
            <div class="lb-row-cat">${r.categoryName !== 'All' ? r.categoryName : ''} · ${r.attempts} વખત · ${r.totalScore}/${r.totalPossible}</div>
          </div>
          <div class="lb-row-score">${r.totalScore} <span style="font-size:var(--font-size-xs);color:var(--text-muted);">માર્ક્સ</span></div>
        </div>
      `).join('');
        }

        function renderEmptyLeaderboard() {
            document.getElementById('lbPodium').innerHTML = '';
            document.getElementById('leaderboardList').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🏆</div>
          <div class="empty-text">હજુ સુધી કોઈ પરિણામ નથી</div>
          <a href="quiz.html" class="btn btn-primary btn-sm mt-md">🎯 ક્વિઝ રમો</a>
        </div>
      `;
        }
    </script>
</body>

</html>

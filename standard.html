<!DOCTYPE html>
<html lang="gu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="ધોરણ - Standard-wise Materials | Online Education Guru">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#6c63ff">
    <title>ધોરણ - Online Education Guru</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="css/common.css">
    <style>
        .material-type-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-sm);
            margin-top: var(--space-md);
        }

        .type-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-normal);
            animation: fadeInUp 0.4s ease both;
        }

        .type-card:hover,
        .type-card.active {
            border-color: var(--primary);
            box-shadow: var(--shadow-glow);
            background: var(--primary-glow);
            transform: translateY(-2px);
        }

        .type-icon {
            font-size: 2rem;
            margin-bottom: var(--space-xs);
        }

        .type-name {
            font-size: var(--font-size-sm);
            font-weight: 600;
        }

        .subject-selector {
            display: flex;
            gap: var(--space-sm);
            flex-wrap: wrap;
            margin-bottom: var(--space-lg);
        }

        .subject-chip {
            padding: 6px 16px;
            border-radius: 100px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            font-size: var(--font-size-sm);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .subject-chip:hover,
        .subject-chip.active {
            background: var(--primary-glow);
            border-color: var(--primary);
            color: var(--primary-light);
        }
    </style>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1217460377621795"
        crossorigin="anonymous"></script>
</head>

<body>

    <!-- Header -->
    <header class="site-header" id="site-header"></header>

    <!-- Breaking News -->
    <div class="news-ticker" id="news-ticker"></div>

    <!-- Loader -->
    <div class="loader-overlay" id="app-loader">
        <div class="spinner"></div>
        <div class="loader-text">લોડ થઈ રહ્યું છે...</div>
    </div>

    <!-- Main Content -->
    <main class="page-wrapper">
        <div class="container">

            <!-- Page Header -->
            <div class="page-header">
                <button class="back-btn" onclick="window.location.href='index.html'">←</button>
                <h1 class="page-title">📖 ધોરણ મુજબ મટિરિયલ્સ</h1>
            </div>

            <!-- Ad Banner -->
            <div class="ad-container" data-ad-slot="6666666601" data-ad-format="auto"></div>

            <!-- Step 1: Standard Selection -->
            <section class="section" id="stdSelectSection">
                <div class="section-title">
                    <span class="icon">📖</span>
                    ધોરણ પસંદ કરો
                </div>
                <div class="folder-grid" id="standardsGrid">
                    <!-- Loaded dynamically -->
                </div>
            </section>

            <!-- Ad Banner after ધોરણ -->
            <div class="ad-container" data-ad-slot="7777777701" data-ad-format="auto"></div>

            <!-- Step 2: Subject Selection (shown after standard select) -->
            <section class="section hidden" id="subjectSelectSection">
                <div class="section-title">
                    <span class="icon">📚</span>
                    વિષય પસંદ કરો - <span id="selectedStdName" style="color:var(--accent-cyan);"></span>
                </div>
                <div class="subject-selector" id="subjectSelector">
                    <!-- Subject chips -->
                </div>
            </section>

            <!-- Ad Banner after વિષય -->
            <div class="ad-container" data-ad-slot="7777777702" data-ad-format="auto"></div>

            <!-- Step 3: Material Type Selection (shown after subject select) -->
            <section class="section hidden" id="typeSelectSection">
                <div class="section-title">
                    <span class="icon">📁</span>
                    સામગ્રી પ્રકાર - <span id="selectedSubjectBreadcrumb" style="color:var(--accent-cyan);"></span>
                </div>
                <div class="material-type-grid" id="typeGrid">
                    <!-- Types loaded dynamically -->
                </div>
            </section>

            <!-- Ad Banner after સામગ્રી પ્રકાર -->
            <div class="ad-container" data-ad-slot="7777777703" data-ad-format="auto"></div>

            <!-- Step 4: Materials List -->
            <section class="section hidden" id="materialsSection">
                <div class="section-title">
                    <span class="icon">📄</span>
                    <span id="materialsTitle">મટિરિયલ્સ</span>
                </div>
                <div id="materialsList" class="strip-list">
                    <!-- Materials loaded here -->
                </div>
            </section>

            <!-- Ad Banner Bottom -->
            <div class="ad-container ad-container-rect" data-ad-slot="7777777704" data-ad-format="auto"></div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer" id="site-footer"></footer>

    <!-- Scripts -->
    <script src="js/common.js"></script>
    <script>
        let selectedStdId = null;
        let selectedSubjectId = null;
        let selectedType = null;
        let allStandards = [];
        let allSubjects = [];

        // Known type mappings (Gujarati name + icon)
        const knownTypes = {
            textbook: { name: 'પાઠ્યપુસ્તક', icon: '📕' },
            workbook: { name: 'સ્વાધ્યાયપોથી', icon: '📗' },
            testpaper: { name: 'ટેસ્ટ પેપર', icon: '📝' },
            solution: { name: 'પેપર સોલ્યુશન', icon: '✅' },
            other: { name: 'અન્ય', icon: '📂' }
        };

        document.addEventListener('DOMContentLoaded', async function () {
            showLoader();

            // Check if standard ID is passed via URL
            const urlStdId = getUrlParam('stdId') || getUrlParam('id');

            try {
                // Load standards first
                renderSkeletonFolders('standardsGrid', 10);
                const stdRes = await apiCached('getStandards');
                allStandards = stdRes.success ? stdRes.data : getDefaultStandardsList();

                renderFolderGrid(allStandards.map(s => ({
                    id: s.id,
                    name: s.standardName,
                    icon: s.icon || '📖'
                })), 'standardsGrid');

                // Add click handlers to folder cards
                document.querySelectorAll('#standardsGrid .folder-card').forEach(card => {
                    card.href = 'javascript:void(0)';
                    card.addEventListener('click', function () {
                        const id = this.dataset.id;
                        selectStandard(id);
                    });
                });

                // Pre-fetch subjects
                const subRes = await apiCached('getSubjects');
                allSubjects = subRes.success ? subRes.data : getDefaultSubjectsList();

                // If Standard ID in URL, auto-select
                if (urlStdId) {
                    selectStandard(urlStdId);
                }

            } catch (err) {
                console.error('Error:', err);
                allStandards = getDefaultStandardsList();
                allSubjects = getDefaultSubjectsList();
                renderFolderGrid(allStandards.map(s => ({
                    id: s.id, name: s.standardName, icon: s.icon || '📖'
                })), 'standardsGrid');
            }

            hideLoader();
        });

        function selectStandard(stdId) {
            selectedStdId = stdId;
            const std = allStandards.find(s => String(s.id) === String(stdId));
            if (!std) return;

            document.getElementById('selectedStdName').textContent = std.standardName || '';

            // Highlight selected standard
            document.querySelectorAll('#standardsGrid .folder-card').forEach(card => {
                card.style.opacity = card.dataset.id === String(stdId) ? '1' : '0.4';
                card.style.borderColor = card.dataset.id === String(stdId) ? 'var(--primary)' : '';
            });

            // Show subject selector
            const subSection = document.getElementById('subjectSelectSection');
            subSection.classList.remove('hidden');

            const subSelector = document.getElementById('subjectSelector');
            subSelector.innerHTML = allSubjects.map(s => `
                <button class="subject-chip" data-id="${s.id}" onclick="selectSubject('${s.id}', this)">
                    ${s.icon || '📚'} ${s.subjectName}
                </button>
            `).join('');

            // Scroll to subject section
            subSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

            // Hide subsequent sections
            document.getElementById('typeSelectSection').classList.add('hidden');
            document.getElementById('materialsSection').classList.add('hidden');
        }

        async function selectSubject(subId, el) {
            selectedSubjectId = subId;
            const sub = allSubjects.find(s => String(s.id) === String(subId));
            const std = allStandards.find(s => String(s.id) === String(selectedStdId));

            // Highlight chip
            document.querySelectorAll('.subject-chip').forEach(c => c.classList.remove('active'));
            if (el) el.classList.add('active');

            document.getElementById('selectedSubjectBreadcrumb').textContent =
                (std?.standardName || '') + ' → ' + (sub?.subjectName || '');

            // Show type selection with loading
            const typeSection = document.getElementById('typeSelectSection');
            typeSection.classList.remove('hidden');
            const typeGrid = document.getElementById('typeGrid');
            typeGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:var(--space-lg);color:var(--text-muted);">સામગ્રી પ્રકાર લોડ થઈ રહ્યા છે...</div>';

            // Hide materials
            document.getElementById('materialsSection').classList.add('hidden');

            // Always show 5 known types + any extra custom types from the sheet
            try {
                const res = await api('getMaterials', {
                    standardId: selectedStdId,
                    subjectId: selectedSubjectId
                });

                // Start with all 5 known types (always shown)
                let allTypes = Object.entries(knownTypes).map(([type, info]) => ({
                    type, name: info.name, icon: info.icon
                }));

                // Find extra custom types from the sheet data that are NOT in known types
                if (res.success && res.data.length > 0) {
                    const sheetTypes = [...new Set(res.data.map(m => String(m.type)).filter(Boolean))];
                    const knownTypeKeys = Object.keys(knownTypes);
                    const extraTypes = sheetTypes.filter(t => !knownTypeKeys.includes(t));

                    // Add extra custom types after the known ones
                    extraTypes.forEach(t => {
                        allTypes.push({ type: t, name: t, icon: '📄' });
                    });
                }

                typeGrid.innerHTML = allTypes.map((item, i) => `
                    <div class="type-card" data-type="${item.type}" onclick="selectType('${item.type}', this)" style="animation-delay:${i * 0.08}s">
                        <div class="type-icon">${item.icon}</div>
                        <div class="type-name">${item.name}</div>
                    </div>
                `).join('');

            } catch (err) {
                console.error('Error loading types:', err);
                // Fallback: show all 5 known types
                typeGrid.innerHTML = Object.entries(knownTypes).map(([type, info], i) => `
                    <div class="type-card" data-type="${type}" onclick="selectType('${type}', this)" style="animation-delay:${i * 0.08}s">
                        <div class="type-icon">${info.icon}</div>
                        <div class="type-name">${info.name}</div>
                    </div>
                `).join('');
            }

            typeSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        async function selectType(type, el) {
            selectedType = type;

            // Highlight type card
            document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'));
            if (el) el.classList.add('active');

            const known = knownTypes[type];
            document.getElementById('materialsTitle').textContent = known ? known.name : type;

            // Show materials section
            const matSection = document.getElementById('materialsSection');
            matSection.classList.remove('hidden');

            // Load materials
            renderSkeletonStrips('materialsList', 4);
            try {
                const res = await api('getMaterials', {
                    standardId: selectedStdId,
                    subjectId: selectedSubjectId,
                    type: type
                });

                if (res.success && res.data.length > 0) {
                    const container = document.getElementById('materialsList');
                    container.innerHTML = res.data.map((item, i) => `
            <div class="material-card" style="animation-delay:${i * 0.08}s">
              <div class="material-icon">${known ? known.icon : '📄'}</div>
              <div class="material-info">
                <div class="material-title">${item.title || 'Untitled'}</div>
              </div>
              <div class="material-actions">
                ${item.driveLink ? `
                  <a href="pdf.html?url=${encodeURIComponent(item.driveLink)}&name=${encodeURIComponent(item.title || 'PDF')}&back=standard.html" class="btn btn-sm btn-secondary">👁️ View</a>
                  <a href="${getDriveDownloadLink(item.driveLink)}" target="_blank" class="btn btn-sm btn-primary">⬇️ Download</a>
                ` : '<span class="badge badge-danger">No Link</span>'}
              </div>
            </div>
          `).join('');
                } else {
                    document.getElementById('materialsList').innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📋</div>
              <div class="empty-text">આ કેટેગરીમાં હાલમાં કોઈ મટિરિયલ ઉપલબ્ધ નથી.</div>
              <p style="color:var(--text-muted);font-size:var(--font-size-xs);margin-top:var(--space-sm);">
                Admin Panel માંથી મટિરિયલ ઉમેરો.
              </p>
            </div>
          `;
                }
            } catch (err) {
                console.error('Error loading materials:', err);
                document.getElementById('materialsList').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <div class="empty-text">મટિરિયલ લોડ કરવામાં સમસ્યા.</div>
          </div>
        `;
            }

            matSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Convert Google Drive view link to download link
        function getDriveDownloadLink(viewLink) {
            if (!viewLink) return '#';
            const match = viewLink.match(/\/d\/([a-zA-Z0-9_-]+)/);
            if (match) {
                return `https://drive.google.com/uc?export=download&id=${match[1]}`;
            }
            return viewLink;
        }

        // Default data
        function getDefaultStandardsList() {
            return [
                { id: 1, standardName: 'બાલ વાટિકા', icon: '💒' },
                { id: 2, standardName: 'ધોરણ 1', icon: '1️⃣' },
                { id: 3, standardName: 'ધોરણ 2', icon: '2️⃣' },
                { id: 4, standardName: 'ધોરણ 3', icon: '3️⃣' },
                { id: 5, standardName: 'ધોરણ 4', icon: '4️⃣' },
                { id: 6, standardName: 'ધોરણ 5', icon: '5️⃣' },
                { id: 7, standardName: 'ધોરણ 6', icon: '6️⃣' },
                { id: 8, standardName: 'ધોરણ 7', icon: '7️⃣' },
                { id: 9, standardName: 'ધોરણ 8', icon: '8️⃣' },
                { id: 10, standardName: 'ધોરણ 9', icon: '9️⃣' },
                { id: 11, standardName: 'ધોરણ 10', icon: '🔟' },
                { id: 12, standardName: 'ધોરણ 11', icon: '📘' },
                { id: 13, standardName: 'ધોરણ 12', icon: '📗' }
            ];
        }

        function getDefaultSubjectsList() {
            return [
                { id: 1, subjectName: 'ગુજરાતી', icon: '📝' },
                { id: 2, subjectName: 'હિન્દી', icon: '📝' },
                { id: 3, subjectName: 'English', icon: '📝' },
                { id: 4, subjectName: 'ગણિત', icon: '🔢' },
                { id: 5, subjectName: 'વિજ્ઞાન', icon: '🔬' },
                { id: 6, subjectName: 'સામાજિક વિજ્ઞાન', icon: '🌍' },
                { id: 7, subjectName: 'સંસ્કૃત', icon: '📜' },
                { id: 8, subjectName: 'ચિત્રકામ', icon: '🎨' },
                { id: 9, subjectName: 'શારીરિક શિક્ષણ', icon: '🏃' },
                { id: 10, subjectName: 'કમ્પ્યુટર', icon: '💻' }
            ];
        }
    </script>
</body>

</html>
